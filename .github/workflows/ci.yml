name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt every JavaScript action (actions/checkout, actions/setup-node,
  # pnpm/action-setup) into Node 24 internally, silencing the Node-20
  # deprecation warning. GitHub will make this the default on 2026-06-02;
  # we set it explicitly so the warning doesn't appear on every CI run
  # until then.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22.13.0']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: CLI smoke (version)
        run: pnpm cli:dev --version

      - name: CLI smoke (doctor on empty workspace)
        shell: bash
        run: |
          SCRATCH="${RUNNER_TEMP:-/tmp}/manthan-ci-test-$RANDOM"
          mkdir -p "$SCRATCH"
          cd "$SCRATCH"
          git init -q
          node "${GITHUB_WORKSPACE}/apps/cli/dist/index.js" doctor || true
